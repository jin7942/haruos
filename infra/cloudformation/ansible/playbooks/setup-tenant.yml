---
# =============================================================================
# HaruOS 테넌트 초기 설정 플레이북
# - Terraform으로 인프라 생성 후 실행
# - DB 마이그레이션 (Flyway)
# - 초기 시드 데이터 삽입
# - ECS 서비스 시작
# =============================================================================
- name: Setup HaruOS Tenant
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    tenant_slug: "{{ lookup('env', 'TENANT_SLUG') }}"
    tenant_id: "{{ lookup('env', 'TENANT_ID') }}"
    aws_region: "{{ lookup('env', 'AWS_REGION') | default('ap-northeast-2', true) }}"
    environment: "{{ lookup('env', 'ENVIRONMENT') | default('prod', true) }}"
    project: "haruos"
    name_prefix: "{{ project }}-{{ environment }}-{{ tenant_slug }}"

  pre_tasks:
    - name: 필수 변수 검증
      ansible.builtin.assert:
        that:
          - tenant_slug | length > 0
          - tenant_id | length > 0
        fail_msg: "TENANT_SLUG, TENANT_ID 환경변수가 필요합니다."

  tasks:
    # ── 1. Terraform으로 테넌트 인프라 생성 ──────────────────────────
    - name: Terraform init (tenant module)
      ansible.builtin.command:
        cmd: >
          terraform init
          -backend-config="key=tenants/{{ tenant_slug }}/terraform.tfstate"
        chdir: "{{ playbook_dir }}/../../terraform"
      changed_when: false

    - name: Terraform apply (tenant resources)
      ansible.builtin.command:
        cmd: >
          terraform apply -auto-approve
          -target=module.tenant_{{ tenant_slug }}
        chdir: "{{ playbook_dir }}/../../terraform"
      register: tf_result

    - name: Terraform 결과 출력
      ansible.builtin.debug:
        var: tf_result.stdout_lines
      when: tf_result.rc == 0

    # ── 2. RDS 엔드포인트 조회 ───────────────────────────────────────
    - name: 테넌트 RDS 엔드포인트 조회
      ansible.builtin.command:
        cmd: >
          aws rds describe-db-clusters
          --db-cluster-identifier {{ name_prefix }}-db
          --query 'DBClusters[0].Endpoint'
          --output text
          --region {{ aws_region }}
      register: rds_endpoint
      changed_when: false

    - name: RDS 준비 대기
      ansible.builtin.command:
        cmd: >
          aws rds wait db-cluster-available
          --db-cluster-identifier {{ name_prefix }}-db
          --region {{ aws_region }}
      changed_when: false

    # ── 3. Flyway DB 마이그레이션 ────────────────────────────────────
    - name: 테넌트 DB 비밀번호 조회 (SSM)
      ansible.builtin.command:
        cmd: >
          aws ssm get-parameter
          --name "/{{ project }}-{{ environment }}/tenant/{{ tenant_slug }}/db/password"
          --with-decryption
          --query 'Parameter.Value'
          --output text
          --region {{ aws_region }}
      register: db_password
      changed_when: false
      no_log: true

    - name: Flyway 마이그레이션 실행
      community.docker.docker_container:
        name: "flyway-{{ tenant_slug }}"
        image: flyway/flyway:10
        command: migrate
        env:
          FLYWAY_URL: "jdbc:postgresql://{{ rds_endpoint.stdout }}:5432/haruos_tenant"
          FLYWAY_USER: "haruos"
          FLYWAY_PASSWORD: "{{ db_password.stdout }}"
        volumes:
          - "{{ playbook_dir }}/../../flyway/tenant:/flyway/sql:ro"
        state: started
        auto_remove: true
      register: flyway_result

    # ── 4. ECS 서비스 desired count 설정 ─────────────────────────────
    - name: ECS 서비스 시작 (desired=1)
      ansible.builtin.command:
        cmd: >
          aws ecs update-service
          --cluster {{ project }}-{{ environment }}-cluster
          --service {{ name_prefix }}
          --desired-count 1
          --region {{ aws_region }}
      changed_when: true

    - name: ECS 서비스 안정화 대기
      ansible.builtin.command:
        cmd: >
          aws ecs wait services-stable
          --cluster {{ project }}-{{ environment }}-cluster
          --services {{ name_prefix }}
          --region {{ aws_region }}
      changed_when: false

    - name: 테넌트 설정 완료
      ansible.builtin.debug:
        msg: "테넌트 '{{ tenant_slug }}' 설정 완료. RDS: {{ rds_endpoint.stdout }}"
