# HaruOS Docker Compose - 프로덕션 빌드
# 사용법: docker compose up --build
# 개발용: docker compose -f docker-compose.dev.yml up

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: haruos
      POSTGRES_PASSWORD: haruos
      # 기본 DB는 postgres, 실제 DB는 init-db.sh로 생성
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haruos"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  flyway-console:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/console:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/haruos_console
      FLYWAY_USER: haruos
      FLYWAY_PASSWORD: haruos
    depends_on:
      postgres:
        condition: service_healthy

  flyway-tenant:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/tenant:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/haruos_tenant
      FLYWAY_USER: haruos
      FLYWAY_PASSWORD: haruos
    depends_on:
      postgres:
        condition: service_healthy

  console-api:
    build:
      context: ../..
      dockerfile: infra/docker/console-api.Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: haruos
      DB_PASSWORD: haruos
      DB_DATABASE: haruos_console
      JWT_SECRET: docker-dev-secret
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      flyway-console:
        condition: service_completed_successfully
    restart: unless-stopped

  tenant-api:
    build:
      context: ../..
      dockerfile: infra/docker/tenant-api.Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: haruos
      DB_PASSWORD: haruos
      DB_DATABASE: haruos_tenant
      JWT_SECRET: docker-dev-secret
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      AWS_REGION: ap-northeast-2
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      flyway-tenant:
        condition: service_completed_successfully
    restart: unless-stopped

  console-web:
    build:
      context: ../..
      dockerfile: infra/docker/console-web.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - console-api
    restart: unless-stopped

  tenant-web:
    build:
      context: ../..
      dockerfile: infra/docker/tenant-web.Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - tenant-api
    restart: unless-stopped

volumes:
  postgres_data:
