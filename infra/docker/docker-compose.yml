# HaruOS Docker Compose - 프로덕션 빌드
# 사용법: docker compose up --build
# 개발용: docker compose -f docker-compose.dev.yml up
# 환경변수: .env 파일에서 주입 (cp .env.example .env)

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CONSOLE_DB_NAME: ${CONSOLE_DB_NAME}
      TENANT_DB_NAME: ${TENANT_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  flyway-console:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/console:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${CONSOLE_DB_NAME}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  flyway-tenant:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/tenant:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${TENANT_DB_NAME}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  console-api:
    build:
      context: ../..
      dockerfile: infra/docker/console-api.Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${CONSOLE_API_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${CONSOLE_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY}
      STRIPE_PRICE_YEARLY: ${STRIPE_PRICE_YEARLY}
    depends_on:
      postgres:
        condition: service_healthy
      flyway-console:
        condition: service_completed_successfully
    restart: unless-stopped

  tenant-api:
    build:
      context: ../..
      dockerfile: infra/docker/tenant-api.Dockerfile
    environment:
      NODE_ENV: production
      PORT: ${TENANT_API_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${TENANT_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      AWS_REGION: ${AWS_REGION}
      CLICKUP_WEBHOOK_SECRET: ${CLICKUP_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      flyway-tenant:
        condition: service_completed_successfully
    restart: unless-stopped

  console-web:
    build:
      context: ../..
      dockerfile: infra/docker/console-web.Dockerfile
    ports:
      - "${CONSOLE_WEB_PORT}:80"
    depends_on:
      - console-api
    restart: unless-stopped

  tenant-web:
    build:
      context: ../..
      dockerfile: infra/docker/tenant-web.Dockerfile
    ports:
      - "${TENANT_WEB_PORT}:80"
    depends_on:
      - tenant-api
    restart: unless-stopped

volumes:
  postgres_data:
