# HaruOS 개발 게이트웨이 (단일 nginx, Host 헤더 기반 라우팅)
#
# 두 가지 접속 도메인을 모두 받는다 (한 conf 로 양쪽 환경 커버):
#   *.haruos.localhost  - 협업 표준. 브라우저가 127.0.0.1 자동 해석 (hosts 불필요)
#   *.haruos.internal   - 이 머신 전용. 공용 proxy 가 넘겨줌 (make up-internal)
#
#   console.haruos.{localhost,internal}  -> console-web-dev + /api -> console-api
#   tenant.haruos.{localhost,internal}   -> tenant-web-dev  + /api -> tenant-api
#   {t}.tenant.haruos.{localhost,internal} -> tenant-web-dev (멀티테넌트 서브도메인)
#
# 운영 conf(console.conf, tenant.conf)는 별도이며 이 파일은 개발 전용이다.

# WebSocket/HMR upgrade 처리: Upgrade 헤더가 있을 때만 connection: upgrade 적용.
# 모든 요청에 무조건 upgrade 를 강제하면 일부 클라이언트에서 400 을 유발한다.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# 관리 콘솔: console.haruos.internal
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name console.haruos.localhost console.haruos.internal;

    # API 프록시 -> console-api
    location /api/ {
        proxy_pass http://console-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE 지원
        proxy_buffering off;
        proxy_cache off;
    }

    # WebSocket 프록시 -> console-api
    location /ws/ {
        proxy_pass http://console-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }

    # Vite dev server (정적 + HMR 웹소켓) -> console-web-dev
    location / {
        proxy_pass http://console-web-dev:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
}

# ---------------------------------------------------------------------------
# 테넌트 앱: tenant.haruos.internal 및 모든 서브도메인 (*.tenant.haruos.internal)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name tenant.haruos.localhost *.tenant.haruos.localhost
                tenant.haruos.internal *.tenant.haruos.internal;

    # API 프록시 -> tenant-api
    location /api/ {
        proxy_pass http://tenant-api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE 지원
        proxy_buffering off;
        proxy_cache off;
    }

    # WebSocket 프록시 -> tenant-api
    location /ws/ {
        proxy_pass http://tenant-api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }

    # Vite dev server (정적 + HMR 웹소켓) -> tenant-web-dev
    location / {
        proxy_pass http://tenant-web-dev:5174;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
}

# ---------------------------------------------------------------------------
# 기본 서버: 알 수 없는 Host 로 들어오면 안내 (포트 직접 접근 차단 효과)
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name _;
    return 421 "Use console.haruos.localhost or tenant.haruos.localhost\n";
}
