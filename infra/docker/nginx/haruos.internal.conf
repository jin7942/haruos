# 공용 nginx-proxy 등록용 conf (현재 머신의 /factory/infra/nginx/conf.d/ 에 복사)
#
# 이 파일은 HaruOS 레포 밖의 공용 리버스 프록시(jin-net, :80)에 넣는 설정의
# 참조 복사본이다. 공용 proxy 가 console/tenant.haruos.internal 요청을
# HaruOS 개발 게이트웨이('haruos-gateway' alias)로 넘긴다.
#
# 핵심: HaruOS 는 개발할 때만 떠 있고 공용 proxy 는 항상 상주한다.
# 따라서 upstream 을 변수 + Docker resolver(127.0.0.11)로 동적 해석한다.
# 이렇게 하면 HaruOS 가 꺼져 있어도 nginx 가 정상 기동하며, 그 시점 요청만 502 가 된다
# (proxy_pass 에 호스트명을 직접 쓰면 부재 시 nginx 자체가 기동 실패 -> 다른 서비스 동반 사망).
#
# 설치:
#   cp infra/docker/nginx/haruos.internal.conf /factory/infra/nginx/conf.d/haruos.conf
#   docker exec nginx-proxy nginx -t && docker exec nginx-proxy nginx -s reload
#
# 전제: HaruOS gateway 가 jin-net 에 'haruos-gateway' alias 로 합류
#       (docker-compose.dev.yml 의 gateway.networks 참고).

server {
    listen 80;
    server_name console.haruos.internal;

    location / {
        resolver 127.0.0.11 valid=10s;
        set $haruos_up haruos-gateway;
        proxy_pass http://$haruos_up;

        # location 에 proxy_set_header 가 생기면 http 블록의 상속이 끊기므로
        # Host 를 여기서 명시한다 (없으면 gateway 가 Host 를 못 알아보고 421 반환).
        proxy_set_header Host $host;
        # HMR/WebSocket 업그레이드 전파 (2단 프록시: 공용 -> gateway -> vite)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name tenant.haruos.internal *.tenant.haruos.internal;

    location / {
        resolver 127.0.0.11 valid=10s;
        set $haruos_up haruos-gateway;
        proxy_pass http://$haruos_up;

        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_buffering off;
    }
}
