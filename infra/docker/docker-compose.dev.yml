# HaruOS Docker Compose - 개발 모드 (nginx 리버스 프록시 + hot reload)
# 사용법: docker compose -f docker-compose.dev.yml up
#
# 아키텍처:
#   nginx-console (5173) → /api/* → console-api:3000 (내부)
#                         → /*    → console-web-dev:5173 (Vite HMR)
#   nginx-tenant  (5174) → /api/* → tenant-api:3001 (내부)
#                         → /*    → tenant-web-dev:5174 (Vite HMR)
#   postgres (내부) ← console-api, tenant-api
#
# 외부 노출 포트: 5173 (console), 5174 (tenant) 만

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: haruos
      POSTGRES_PASSWORD: haruos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
    # 내부 네트워크에서만 접근. 호스트 포트 노출 없음.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haruos"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway-console:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/console:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/haruos_console
      FLYWAY_USER: haruos
      FLYWAY_PASSWORD: haruos
    depends_on:
      postgres:
        condition: service_healthy

  flyway-tenant:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/tenant:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/haruos_tenant
      FLYWAY_USER: haruos
      FLYWAY_PASSWORD: haruos
    depends_on:
      postgres:
        condition: service_healthy

  console-api:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm dev:console-api"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: haruos
      DB_PASSWORD: haruos
      DB_DATABASE: haruos_console
      JWT_SECRET: docker-dev-secret
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:5173
    # 포트 호스트 노출 없음. nginx가 프록시.
    depends_on:
      postgres:
        condition: service_healthy
      flyway-console:
        condition: service_completed_successfully

  tenant-api:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm dev:tenant-api"
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: haruos
      DB_PASSWORD: haruos
      DB_DATABASE: haruos_tenant
      JWT_SECRET: docker-dev-secret
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      AWS_REGION: ap-northeast-2
    # 포트 호스트 노출 없음. nginx가 프록시.
    depends_on:
      postgres:
        condition: service_healthy
      flyway-tenant:
        condition: service_completed_successfully

  console-web-dev:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm --filter @haruos/console-web dev -- --host"
    environment:
      VITE_API_URL: ""
    # 포트 호스트 노출 없음. nginx가 프록시.
    depends_on:
      - console-api

  tenant-web-dev:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm --filter @haruos/tenant-web dev -- --host"
    environment:
      VITE_API_URL: ""
    # 포트 호스트 노출 없음. nginx가 프록시.
    depends_on:
      - tenant-api

  # nginx 리버스 프록시 (console)
  nginx-console:
    image: nginx:alpine
    ports:
      - "5173:80"
    volumes:
      - ./nginx/console-dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - console-api
      - console-web-dev

  # nginx 리버스 프록시 (tenant)
  nginx-tenant:
    image: nginx:alpine
    ports:
      - "5174:80"
    volumes:
      - ./nginx/tenant-dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - tenant-api
      - tenant-web-dev

volumes:
  postgres_data:
  pnpm_store:
