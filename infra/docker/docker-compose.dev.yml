# HaruOS Docker Compose - 개발 모드 (nginx 리버스 프록시 + hot reload)
# 사용법: docker compose -f docker-compose.dev.yml up
# 환경변수: .env 파일에서 주입 (cp .env.example .env)
#
# 아키텍처:
#   nginx-console (CONSOLE_WEB_PORT) → /api/* → console-api (내부)
#                                    → /*    → console-web-dev (Vite HMR)
#   nginx-tenant  (TENANT_WEB_PORT)  → /api/* → tenant-api (내부)
#                                    → /*    → tenant-web-dev (Vite HMR)
#   postgres (내부) ← console-api, tenant-api
#
# 외부 노출 포트: CONSOLE_WEB_PORT, TENANT_WEB_PORT 만

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CONSOLE_DB_NAME: ${CONSOLE_DB_NAME}
      TENANT_DB_NAME: ${TENANT_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway-console:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/console:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${CONSOLE_DB_NAME}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  flyway-tenant:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/tenant:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${TENANT_DB_NAME}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  console-api:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm dev:console-api"
    environment:
      NODE_ENV: development
      PORT: ${CONSOLE_API_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${CONSOLE_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY}
      STRIPE_PRICE_YEARLY: ${STRIPE_PRICE_YEARLY}
    depends_on:
      postgres:
        condition: service_healthy
      flyway-console:
        condition: service_completed_successfully

  tenant-api:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm dev:tenant-api"
    environment:
      NODE_ENV: development
      PORT: ${TENANT_API_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${TENANT_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      AWS_REGION: ${AWS_REGION}
      CLICKUP_WEBHOOK_SECRET: ${CLICKUP_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      flyway-tenant:
        condition: service_completed_successfully

  console-web-dev:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm --filter @haruos/console-web dev -- --host"
    environment:
      VITE_API_URL: ""
    depends_on:
      - console-api

  tenant-web-dev:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm --filter @haruos/tenant-web dev -- --host"
    environment:
      VITE_API_URL: ""
    depends_on:
      - tenant-api

  nginx-console:
    image: nginx:alpine
    ports:
      - "${CONSOLE_WEB_PORT}:80"
    volumes:
      - ./nginx/console-dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - console-api
      - console-web-dev

  nginx-tenant:
    image: nginx:alpine
    ports:
      - "${TENANT_WEB_PORT}:80"
    volumes:
      - ./nginx/tenant-dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - tenant-api
      - tenant-web-dev

volumes:
  postgres_data:
  pnpm_store:
