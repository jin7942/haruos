# HaruOS Docker Compose - 개발 모드 (단일 nginx 게이트웨이 + hot reload)
# 사용법: make up  (또는 docker compose -f docker-compose.dev.yml up)
# 환경변수: .env 파일에서 주입 (cp .env.example .env)
#
# 자족적 기본 구성 — 클론 후 make up 만으로 어디서나 동작 (외부 인프라 의존 없음).
# 아키텍처 (Host 헤더 기반 라우팅, HTTP_PORT 단일 진입):
#   gateway(:80)
#     console.haruos.localhost          → /api/* → console-api / /* → console-web-dev(HMR)
#     tenant.haruos.localhost 및 서브도메인 → /api/* → tenant-api  / /* → tenant-web-dev(HMR)
#   postgres (내부) ← console-api, tenant-api
#
# *.localhost 는 브라우저가 127.0.0.1 로 자동 해석 → hosts 등록 불필요.
# 이 머신의 공용 proxy(.internal) 통합은 docker-compose.internal.yml 오버레이 + `make up-internal`.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CONSOLE_DB_NAME: ${CONSOLE_DB_NAME}
      TENANT_DB_NAME: ${TENANT_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway-console:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/console:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${CONSOLE_DB_NAME}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  flyway-tenant:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/tenant:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${TENANT_DB_NAME}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  console-api:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm dev:console-api"
    environment:
      NODE_ENV: development
      PORT: ${CONSOLE_API_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${CONSOLE_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY}
      STRIPE_PRICE_YEARLY: ${STRIPE_PRICE_YEARLY}
    depends_on:
      postgres:
        condition: service_healthy
      flyway-console:
        condition: service_completed_successfully

  tenant-api:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm dev:tenant-api"
    environment:
      NODE_ENV: development
      PORT: ${TENANT_API_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${TENANT_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      CORS_ORIGIN: ${TENANT_CORS_ORIGIN}
      AWS_REGION: ${AWS_REGION}
      CLICKUP_WEBHOOK_SECRET: ${CLICKUP_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      flyway-tenant:
        condition: service_completed_successfully

  console-web-dev:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm --filter @haruos/console-web dev"
    environment:
      VITE_API_URL: ""
      # 브라우저가 게이트웨이 포트로 HMR 웹소켓을 연결하도록 맞춘다.
      VITE_HMR_PORT: ${HTTP_PORT:-80}
    depends_on:
      - console-api

  tenant-web-dev:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm --filter @haruos/tenant-web dev"
    environment:
      VITE_API_URL: ""
      # 브라우저가 게이트웨이 포트로 HMR 웹소켓을 연결하도록 맞춘다.
      VITE_HMR_PORT: ${HTTP_PORT:-80}
    depends_on:
      - tenant-api

  # 단일 게이트웨이: Host 헤더로 console/tenant 분기.
  # 베이스에는 포트 노출/네트워크를 두지 않는다 (compose 오버레이가 리스트 항목을
  # 제거하지 못하는 한계 때문). 접근 방식은 오버레이로 결정한다:
  #   - 협업 표준: docker-compose.standalone.yml (HTTP_PORT 노출, *.localhost)
  #   - 이 머신: docker-compose.internal.yml (jin-net alias, 공용 proxy 경유, *.internal)
  # Makefile 의 up / up-internal 이 각 오버레이를 자동으로 합친다.
  gateway:
    image: nginx:alpine
    volumes:
      - ./nginx/dev-gateway.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - console-api
      - console-web-dev
      - tenant-api
      - tenant-web-dev

volumes:
  postgres_data:
  pnpm_store:
