# HaruOS Docker Compose - 개발 모드 (단일 nginx 게이트웨이 + hot reload)
# 사용법: make dev  (또는 docker compose -f docker-compose.dev.yml up)
# 환경변수: .env 파일에서 주입 (cp .env.example .env)
#
# 아키텍처 (Host 헤더 기반 라우팅, 80 포트 단일 진입):
#   gateway(:80)
#     console.haruos.local          → /api/* → console-api / /* → console-web-dev(Vite HMR)
#     tenant.haruos.local 및 서브도메인 → /api/* → tenant-api  / /* → tenant-web-dev(Vite HMR)
#   postgres (내부) ← console-api, tenant-api
#
# 외부 노출 포트: HTTP_PORT(기본 80) 하나
# /etc/hosts 에 추가 필요: 127.0.0.1 console.haruos.local tenant.haruos.local

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CONSOLE_DB_NAME: ${CONSOLE_DB_NAME}
      TENANT_DB_NAME: ${TENANT_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway-console:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/console:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${CONSOLE_DB_NAME}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  flyway-tenant:
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ../flyway/tenant:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${TENANT_DB_NAME}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  console-api:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm dev:console-api"
    environment:
      NODE_ENV: development
      PORT: ${CONSOLE_API_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${CONSOLE_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY}
      STRIPE_PRICE_YEARLY: ${STRIPE_PRICE_YEARLY}
    depends_on:
      postgres:
        condition: service_healthy
      flyway-console:
        condition: service_completed_successfully

  tenant-api:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm dev:tenant-api"
    environment:
      NODE_ENV: development
      PORT: ${TENANT_API_PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${TENANT_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      CORS_ORIGIN: ${TENANT_CORS_ORIGIN}
      AWS_REGION: ${AWS_REGION}
      CLICKUP_WEBHOOK_SECRET: ${CLICKUP_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      flyway-tenant:
        condition: service_completed_successfully

  console-web-dev:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm --filter @haruos/console-web dev"
    environment:
      VITE_API_URL: ""
      # 브라우저가 게이트웨이 포트로 HMR 웹소켓을 연결하도록 맞춘다.
      VITE_HMR_PORT: ${HTTP_PORT:-80}
    depends_on:
      - console-api

  tenant-web-dev:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ../..:/app
      - pnpm_store:/app/.pnpm-store
    command: sh -c "corepack enable && pnpm --filter @haruos/tenant-web dev"
    environment:
      VITE_API_URL: ""
      # 브라우저가 게이트웨이 포트로 HMR 웹소켓을 연결하도록 맞춘다.
      VITE_HMR_PORT: ${HTTP_PORT:-80}
    depends_on:
      - tenant-api

  # 단일 게이트웨이: 80 포트 하나로 받아 Host 헤더로 console/tenant 분기.
  # 포트 직접 접근(5173/5174) 구조를 제거하고 운영 구성과 동일한 진입 방식을 쓴다.
  gateway:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/dev-gateway.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - console-api
      - console-web-dev
      - tenant-api
      - tenant-web-dev

volumes:
  postgres_data:
  pnpm_store:
